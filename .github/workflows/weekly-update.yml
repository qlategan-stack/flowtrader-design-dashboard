name: Weekly Dashboard Update

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration even if source hash is unchanged"
        required: false
        default: "false"

jobs:
  update:
    name: Regenerate dashboard if source changed
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Checkout FlowTrader trading-bot source
        uses: actions/checkout@v4
        with:
          repository: qlategan-stack/flowtrader
          path: flowtrader-source

      - name: Checkout FlowTrader dashboard source
        uses: actions/checkout@v4
        with:
          repository: qlategan-stack/flowtrader-dashboard
          path: flowtrader-dashboard-source

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOWTRADER_SOURCE_PATH: flowtrader-source
          FLOWTRADER_DASHBOARD_PATH: flowtrader-dashboard-source
          FLOWTRADER_FORCE_REGEN: ${{ inputs.force }}
        run: python scripts/update_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html .dashboard-hash archive/ 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: auto-update dashboard $(date -u +%Y-%m-%d)"
            git push
          )
